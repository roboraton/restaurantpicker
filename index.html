<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/restaurantpicker/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Picker</title>
    <script type="module" crossorigin src="/restaurantpicker/assets/index-XXXX.js"></script>
    <link rel="stylesheet" href="./src/css/style.css" />
  </head>

  <body>
    <h1>Restaurant Picker</h1>

    <p class="instructions">
      First choose a food type, then press <strong>"Surprise Me"</strong> to get a random result.
    </p>

    <!-- FILTERS -->
    <label for="typeFilter">Choose food type:</label>
    <select id="typeFilter">
      <option value="">Select a food type</option>
      <option value="chicken">Chicken</option>
      <option value="beef">Beef</option>
      <option value="pasta">Pasta</option>
      <option value="seafood">Seafood</option>
      <option value="pork">Pork</option>
      <option value="lamb">Lamb</option>
      <option value="goat">Goat</option>
      <option value="breakfast">Breakfast</option>
      <option value="dessert">Dessert</option>
      <option value="vegan">Vegan</option>
      <option value="vegetarian">Vegetarian</option>
    </select>

    <label for="priceFilter">Filter by price:</label>
    <select id="priceFilter">
      <option value="">All prices</option>
      <option value="1">$</option>
      <option value="2">$$</option>
      <option value="3">$$$</option>
    </select>

    <label for="ratingFilter">Filter by rating:</label>
    <select id="ratingFilter">
      <option value="">All ratings</option>
      <option value="3">⭐⭐⭐</option>
      <option value="4">⭐⭐⭐⭐</option>
      <option value="5">⭐⭐⭐⭐⭐</option>
    </select>

    <button id="resetFilters">Reset Filters</button>

    <!-- FAVORITES -->
    <div id="favorites"></div>

    <!-- HISTORY -->
    <div id="history"></div>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">
      <div id="map"></div>

      <div class="results-panel">
        <div id="results"></div>
        <button id="randomBtn">Surprise Me</button>
      </div>
    </div>

    <!-- DETAILS -->
    <div id="details"></div>

    <!-- MAIN JS -->
    <script type="module" src="/src/main.js"></script>

    <!-- CLUSTER -->
    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

    <!-- GOOGLE MAPS -->
    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBG93NCpZZJ2XA2f9FgUYKWYsWYCIdjqeM&callback=initMap"
      async
      defer
    ></script>
  </body>
</html>
